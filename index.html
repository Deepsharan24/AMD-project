<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tron Snake</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="phone-frame">
        <div class="brand">ENCOM</div>
        <div class="screen-bezel">
            <div class="screen">
                <div class="score-board">
                    <span>SCORE: <span id="score">0</span></span>
                    <span>HI: <span id="hi-score">0</span></span>
                </div>
                <canvas id="gameCanvas" width="240" height="240"></canvas>
                <div id="game-over" class="hidden">
                    <h2>DEREZZED</h2>
                    <p>Press Space/Tap OK<br>to Reboot</p>
                </div>
            </div>
        </div>
        <div class="keypad">
            <button class="btn ok" id="btn-ok">OK</button>
            <div class="d-pad">
                <button class="btn up" id="btn-up">▲</button>
                <div class="mid-row">
                    <button class="btn left" id="btn-left">◀</button>
                    <div class="spacer"></div>
                    <button class="btn right" id="btn-right">▶</button>
                </div>
                <button class="btn down" id="btn-down">▼</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
